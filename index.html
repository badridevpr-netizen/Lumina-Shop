<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shop Lumina | Purely Essential</title>
    <script src="https://www.paypal.com/sdk/js?client-id=ARQvAzTxllHUAOMlpowp-0ODStK4ZdGqFCEHl88kjcJ-KfYC8jELT1DXjEb9pxYrzaXTPi755zDXX5LH&currency=USD&components=buttons"></script>
    
    <style>
        body { 
            background-color: #000; 
            color: #fff; 
            font-family: 'Segoe UI', sans-serif; 
            margin: 0; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            min-height: 100vh;
        }
        .container { 
            background: #fff; 
            color: #000; 
            padding: 40px; 
            border-radius: 30px; 
            width: 100%; 
            max-width: 400px; 
            text-align: center;
            box-shadow: 0 10px 40px rgba(255, 255, 255, 0.1);
        }
        .badge { 
            background: #f0f0f0; 
            padding: 5px 15px; 
            border-radius: 20px; 
            font-size: 12px; 
            font-weight: bold; 
            display: inline-block;
            margin-bottom: 15px;
        }
        h1 { font-size: 32px; margin: 0; font-weight: 800; letter-spacing: -1px; }
        .slogan { color: #888; margin-bottom: 30px; font-size: 14px; }
        
        .form-group { text-align: left; margin-bottom: 15px; }
        label { font-size: 12px; font-weight: bold; text-transform: uppercase; color: #555; margin-left: 5px; }
        
        input, select { 
            width: 100%; 
            padding: 15px; 
            margin-top: 5px; 
            border: 1px solid #eee; 
            border-radius: 12px; 
            box-sizing: border-box; 
            font-size: 16px;
            background: #f9f9f9;
        }
        
        .price-display { 
            font-size: 24px; 
            font-weight: bold; 
            margin: 20px 0; 
            color: #000;
        }

        #paypal-button-container { margin-top: 25px; }
    </style>
</head>
<body>

<div class="container">
    <div class="badge">DUBAI BASED</div>
    <h1>LUMINA</h1>
    <div class="slogan">Purely Essential.</div>

    <div class="form-group">
        <label>Full Name</label>
        <input type="text" id="orderName" placeholder="Enter name">
    </div>

    <div class="form-group">
        <label>Delivery Address</label>
        <input type="text" id="orderAddress" placeholder="Dubai / Sharjah address">
    </div>

    <div class="form-group">
        <label>Quantity</label>
        <select id="orderQty">
            <option value="1">1 Bottle - 4 AED</option>
            <option value="2">2 Bottles - 8 AED</option>
            <option value="4" selected>4 Bottles - 16 AED</option>
            <option value="10">10 Bottles - 40 AED</option>
        </select>
    </div>

    <div class="price-display">4 AED Per Bottle</div>

    <div id="paypal-button-container"></div>
</div>

<script>
    const scriptURL = 'https://script.google.com/macros/s/AKfycbwlP_f2ls-MIT-RHixtjP0Y0TBLs3tfCw5_QVWjbT8GFiRHmGZY4u0bVmBc6RJQmCpJ/exec';

    paypal.Buttons({
        style: {
            layout: 'vertical',
            color:  'gold',
            shape:  'rect',
            label:  'paypal'
        },
        createOrder: function(data, actions) {
            const name = document.getElementById('orderName').value;
            const addr = document.getElementById('orderAddress').value;
            const qty = document.getElementById('orderQty').value;

            if (!name || !addr) {
                alert("Please fill in your delivery details!");
                return actions.reject();
            }

            return actions.order.create({
                purchase_units: [{
                    description: "Lumina Cleaner (" + qty + " bottles)",
                    amount: {
                        currency_code: "USD",
                        value: (qty * 1.09).toFixed(2)
                    }
                }]
            });
        },
        onApprove: function(data, actions) {
            return actions.order.capture().then(function(details) {
                const orderData = {
                    type: "order",
                    name: document.getElementById('orderName').value,
                    address: document.getElementById('orderAddress').value,
                    quantity: document.getElementById('orderQty').value,
                    total: (document.getElementById('orderQty').value * 4) + " AED",
                    payer_email: details.payer.email_address
                };

                fetch(scriptURL, { 
                    method: 'POST', 
                    mode: 'no-cors', 
                    body: JSON.stringify(orderData) 
                });

                alert('Order Successful, ' + details.payer.name.given_name + '!');
                window.location.reload();
            });
        }
    }).render('#paypal-button-container');
</script>

</body>
</html>
