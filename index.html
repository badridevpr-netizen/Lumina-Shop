<body>

    <div class="navbar"><div class="logo">LUMINA</div></div>

    <div class="hero">
        <h1>Purely<br>Essential.</h1>
        <p>A Magician Never Reveals Their Secret</p>
    </div>

    <div class="main-content">
        <div class="product-info">
            <h2>Multi-Surface</h2>
            <p>streak-free clarity, derived from nature, bottled in Dubai.</p>
            <div class="tag-container">
                <div class="tag">Dubai, UAE</div>
                <div class="tag">Natural</div>
            </div>
        </div>

        <div class="checkout-card">
            <div class="price-tag">4.37 <span>AED</span></div>
            <p style="color:#555; font-size:12px; margin-bottom:20px;">Unit Price (Excl. Fees)</p>
            
            <input type="text" id="orderName" placeholder="Full Name">
            <input type="text" id="orderAddress" placeholder="Delivery Address (UAE Only)">
            
            <label style="display:block; text-align:left; font-size:12px; color:#888; margin-bottom:5px;">Select Quantity</label>
            <select id="orderQty" onchange="updateTotal()">
                <option value="1" selected>1 Bottle</option>
                <option value="2">2 Bottles</option>
                <option value="4">4 Bottles</option>
                <option value="10">10 Bottles</option>
            </select>

            <div class="live-total-box" style="color:#27ae60; font-weight:bold; margin-bottom:20px;">
                Total: <span id="displayTotal">4.37</span> AED
            </div>

            <div id="paypal-button-container"></div>
        </div>
    </div>

<script>
    const scriptURL = 'https://script.google.com/macros/s/AKfycbwlP_f2ls-MIT-RHixtjP0Y0TBLs3tfCw5_QVWjbT8GFiRHmGZY4u0bVmBc6RJQmCpJ/exec';

    function updateTotal() {
        const qty = document.getElementById('orderQty').value;
        document.getElementById('displayTotal').innerText = (qty * 4.37).toFixed(2);
    }

    // This part forces both buttons to try and show up
    paypal.Buttons({
        style: {
            layout: 'vertical',
            color:  'gold',
            shape:  'rect',
            label:  'checkout' // Changed from 'paypal' to 'checkout' to encourage card display
        },
        createOrder: function(data, actions) {
            const qty = document.getElementById('orderQty').value;
            if (!document.getElementById('orderName').value || !document.getElementById('orderAddress').value) {
                alert("Please fill in your details first!");
                return actions.reject();
            }
            return actions.order.create({
                purchase_units: [{ amount: { currency_code: "USD", value: (qty * 1.19).toFixed(2) } }]
            });
        },
        onApprove: function(data, actions) {
            return actions.order.capture().then(function(details) {
                const orderData = {
                    type: "order",
                    name: document.getElementById('orderName').value,
                    address: document.getElementById('orderAddress').value,
                    quantity: document.getElementById('orderQty').value,
                    total: document.getElementById('displayTotal').innerText + " AED",
                    payer_email: details.payer.email_address
                };
                fetch(scriptURL, { method: 'POST', mode: 'no-cors', body: JSON.stringify(orderData) });
                alert('Success! Check your email for confirmation.');
                window.location.reload();
            });
        }
    }).render('#paypal-button-container');
</script>
</body>
