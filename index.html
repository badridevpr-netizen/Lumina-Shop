<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lumina | Purely Essential</title>
    <script src="https://www.paypal.com/sdk/js?client-id=ARQvAzTxllHUAOMlpowp-0ODStK4ZdGqFCEHl88kjcJ-KfYC8jELT1DXjEb9pxYrzaXTPi755zDXX5LH&currency=USD&components=buttons&disable-funding=credit,card"></script>
    
    <style>
        body { background-color: #000; color: #fff; font-family: 'Segoe UI', sans-serif; margin: 0; padding: 0; }
        .navbar { padding: 30px 50px; display: flex; justify-content: center; }
        .logo { font-size: 28px; font-weight: bold; letter-spacing: 4px; }
        .hero { text-align: center; padding: 80px 20px; }
        .hero h1 { font-size: clamp(50px, 10vw, 90px); margin: 0; font-weight: 800; line-height: 0.9; }
        .hero p { color: #888; font-size: 18px; margin-top: 20px; letter-spacing: 1px; }
        .main-content { display: flex; justify-content: center; gap: 40px; padding: 40px; flex-wrap: wrap; }
        .product-info { max-width: 400px; }
        .product-info h2 { font-size: 40px; margin-bottom: 10px; }
        .tag-container { display: flex; gap: 10px; margin-top: 20px; }
        .tag { border: 1px solid #333; padding: 8px 15px; border-radius: 30px; font-size: 12px; text-transform: uppercase; color: #888; }
        
        .checkout-card { background: #111; padding: 40px; border-radius: 25px; width: 100%; max-width: 380px; border: 1px solid #222; }
        .price-tag { font-size: 32px; font-weight: bold; margin-bottom: 5px; }
        .price-tag span { font-size: 16px; color: #555; margin-left: 5px; }
        
        .live-total-box { color: #27ae60; font-weight: bold; font-size: 18px; margin-bottom: 20px; text-align: left; border-bottom: 1px solid #222; padding-bottom: 10px; }
        
        input, select, textarea { width: 100%; padding: 15px; margin-bottom: 15px; border-radius: 12px; border: 1px solid #222; background: #000; color: #fff; font-size: 16px; }
        .divider { border-top: 1px solid #222; margin: 100px 10%; }
        .review-section { padding: 0 20px 100px 20px; display: flex; flex-direction: column; align-items: center; text-align: center; }
        #paypal-button-container { margin-top: 15px; }
        .submit-btn { background: #fff; color: #000; border: none; padding: 18px; width: 100%; border-radius: 12px; font-weight: bold; cursor: pointer; font-size: 16px; transition: 0.3s; }
        .review-card { background: #111; padding: 30px; border-radius: 25px; width: 100%; max-width: 450px; border: 1px solid #222; }
    </style>
</head>
<body>

    <div class="navbar">
        <div class="logo">LUMINA</div>
    </div>

    <div class="hero">
        <h1>Purely<br>Essential.</h1>
        <p>A Magician Never Reveals Their Secret</p>
    </div>

    <div class="main-content">
        <div class="product-info">
            <h2>Multi-Surface</h2>
            <p>streak-free clarity, derived from nature, bottled in Dubai.</p>
            <div class="tag-container">
                <div class="tag">Dubai, UAE</div>
                <div class="tag">Natural</div>
            </div>
        </div>

        <div class="checkout-card">
            <div class="price-tag">4.37 <span>AED</span></div>
            <p style="color:#555; font-size:12px; margin-bottom:20px;">Unit Price (Excl. Fees)</p>
            
            <input type="text" id="orderName" placeholder="Full Name">
            <input type="text" id="orderAddress" placeholder="Delivery Address (UAE Only)">
            
            <label style="display:block; text-align:left; font-size:12px; color:#888; margin-bottom:5px;">Select Quantity</label>
            <select id="orderQty" onchange="updateTotal()">
                <option value="1" selected>1 Bottle</option>
                <option value="2">2 Bottles</option>
                <option value="4">4 Bottles</option>
                <option value="10">10 Bottles</option>
            </select>

            <div class="live-total-box">
                Total: <span id="displayTotal">4.37</span> AED
            </div>

            <div id="paypal-button-container"></div>
        </div>
    </div>

    <div class="divider"></div>

    <div class="review-section">
        <h3>Share Your Experience</h3>
        <div class="review-card">
            <input type="text" id="revName" placeholder="Your Name">
            <select id="revRating">
                <option value="5">⭐⭐⭐⭐⭐ (Excellent)</option>
                <option value="4">⭐⭐⭐⭐ (Good)</option>
                <option value="3">⭐⭐⭐ (Average)</option>
            </select>
            <textarea id="revComment" rows="3" placeholder="Tell us what you think..."></textarea>
            <button class="submit-btn" onclick="submitReview()">POST REVIEW</button>
        </div>
    </div>

<script>
    const scriptURL = 'https://script.google.com/macros/s/AKfycbwlP_f2ls-MIT-RHixtjP0Y0TBLs3tfCw5_QVWjbT8GFiRHmGZY4u0bVmBc6RJQmCpJ/exec';

    function updateTotal() {
        const qty = document.getElementById('orderQty').value;
        const totalAED = (qty * 4.37).toFixed(2);
        document.getElementById('displayTotal').innerText = totalAED;
    }

    paypal.Buttons({
        style: { layout: 'vertical', color: 'gold', shape: 'rect', label: 'paypal' },
        createOrder: function(data, actions) {
            const qty = document.getElementById('orderQty').value;
            if (!document.getElementById('orderName').value || !document.getElementById('orderAddress').value) { 
                alert("Please enter your name and UAE address"); 
                return actions.reject(); 
            }
            
            return actions.order.create({
                purchase_units: [{ 
                    amount: { 
                        currency_code: "USD", 
                        value: (qty * 1.19).toFixed(2) 
                    },
                    shipping: {
                        address: {
                            country_code: "AE" // LOCKS SHIPPING TO UAE
                        }
                    }
                }],
                application_context: {
                    shipping_preference: "SET_PROVIDED_ADDRESS",
                    country_code: "AE" // FORCES UAE ON PAYPAL LOGIN
                }
            });
        },
        onApprove: function(data, actions) {
            return actions.order.capture().then(function(details) {
                const qty = document.getElementById('orderQty').value;
                const orderData = {
                    type: "order",
                    name: document.getElementById('orderName').value,
                    address: document.getElementById('orderAddress').value,
                    quantity: qty,
                    total: (qty * 4.37).toFixed(2) + " AED",
                    payer_email: details.payer.email_address
                };
                fetch(scriptURL, { method: 'POST', mode: 'no-cors', body: JSON.stringify(orderData) });
                alert('Order Placed Successfully!');
                window.location.reload();
            });
        }
    }).render('#paypal-button-container');

    function submitReview() {
        const name = document.getElementById('revName').value;
        const comment = document.getElementById('revComment').value;
        if(!name || !comment) { alert("Please fill in all fields!"); return; }
        const revData = {
            type: "review",
            name: name,
            rating: document.getElementById('revRating').value,
            comment: comment
        };
        fetch(scriptURL, { method: 'POST', mode: 'no-cors', body: JSON.stringify(revData) })
        .then(() => {
            alert("Thank you for your review!");
            document.getElementById('revName').value = "";
            document.getElementById('revComment').value = "";
        });
    }
</script>

</body>
</html>
