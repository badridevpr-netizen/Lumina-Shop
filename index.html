<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shop Lumina | Professional Cleaner</title>
    <script src="https://www.paypal.com/sdk/js?client-id=ARQvAzTxllHUAOMlpowp-0ODStK4ZdGqFCEHl88kjcJ-KfYC8jELT1DXjEb9pxYrzaXTPi755zDXX5LH&currency=USD&components=buttons"></script>
    
    <style>
        :root { --primary: #2c3e50; --accent: #27ae60; --bg: #f8f9fa; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: var(--bg); margin: 0; padding: 20px; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        .card { background: white; padding: 30px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); max-width: 400px; width: 100%; text-align: center; }
        h1 { color: var(--primary); margin-bottom: 5px; font-size: 28px; letter-spacing: 1px; }
        .slogan { color: #95a5a6; font-style: italic; margin-bottom: 25px; font-size: 14px; }
        .price-box { background: #e8f6ef; padding: 10px; border-radius: 10px; margin-bottom: 20px; }
        .price { font-size: 22px; font-weight: bold; color: var(--accent); }
        input, select { width: 100%; padding: 12px; margin-bottom: 15px; border: 1px solid #ddd; border-radius: 10px; box-sizing: border-box; font-size: 16px; outline: none; transition: border 0.3s; }
        input:focus { border-color: var(--accent); }
        label { display: block; text-align: left; margin-bottom: 5px; font-weight: 600; color: var(--primary); font-size: 14px; }
        #paypal-button-container { margin-top: 10px; min-height: 150px; }
        .secure-notice { font-size: 11px; color: #bdc3c7; margin-top: 15px; text-transform: uppercase; letter-spacing: 1px; }
    </style>
</head>
<body>

<div class="card">
    <h1>LUMINA</h1>
    <div class="slogan">A Magician Never Reveals Their Secret</div>
    
    <div class="price-box">
        <span class="price">4 AED Per Bottle</span>
    </div>

    <label>Full Name</label>
    <input type="text" id="orderName" placeholder="Enter your name">

    <label>Delivery Address</label>
    <input type="text" id="orderAddress" placeholder="Dubai / Sharjah address">

    <label>Quantity</label>
    <select id="orderQty">
        <option value="1">1 Bottle - 4 AED</option>
        <option value="2">2 Bottles - 8 AED</option>
        <option value="4" selected>4 Bottles - 16 AED</option>
        <option value="10">10 Bottles - 40 AED</option>
    </select>

    <div id="paypal-button-container"></div>
    
    <div class="secure-notice">🛡️ Secure Encrypted Checkout</div>
</div>

<script>
    // Your verified Google Apps Script Link
    const scriptURL = 'https://script.google.com/macros/s/AKfycbwlP_f2ls-MIT-RHixtjP0Y0TBLs3tfCw5_QVWjbT8GFiRHmGZY4u0bVmBc6RJQmCpJ/exec';

    function initPayPal() {
        paypal.Buttons({
            style: {
                layout: 'vertical',
                color:  'gold',
                shape:  'rect',
                label:  'paypal' 
            },
            createOrder: function(data, actions) {
                const qty = document.getElementById('orderQty').value;
                const name = document.getElementById('orderName').value;
                const addr = document.getElementById('orderAddress').value;

                if (!name || !addr) {
                    alert("Please enter your name and address first!");
                    return actions.reject();
                }

                // Convert 4 AED to ~1.09 USD for PayPal
                const totalUSD = (qty * 1.09).toFixed(2);

                return actions.order.create({
                    purchase_units: [{
                        description: "Lumina Cleaner - " + qty + " Bottle(s)",
                        amount: {
                            currency_code: "USD",
                            value: totalUSD
                        }
                    }]
                });
            },
            onApprove: function(data, actions) {
                return actions.order.capture().then(function(details) {
                    
                    const orderData = {
                        type: "order", // Ensures it goes to Sheet1
                        name: document.getElementById('orderName').value,
                        address: document.getElementById('orderAddress').value,
                        quantity: document.getElementById('orderQty').value,
                        total: (document.getElementById('orderQty').value * 4) + " AED",
                        payer_email: details.payer.email_address
                    };

                    // Send to Google Sheets
                    fetch(scriptURL, { 
                        method: 'POST', 
                        mode: 'no-cors', 
                        body: JSON.stringify(orderData) 
                    }).then(() => {
                        alert('Success! Thank you ' + details.payer.name.given_name + '. Your order has been placed.');
                        window.location.reload();
                    });
                });
            },
            onError: function(err) {
                console.error(err);
                alert("The payment window closed or an error occurred. Please try again.");
            }
        }).render('#paypal-button-container');
    }

    initPayPal();
</script>

</body>
</html>
