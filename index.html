<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lumina | Purely Essential</title>
    <script src="https://www.paypal.com/sdk/js?client-id=ARQvAzTxllHUAOMlpowp-0ODStK4ZdGqFCEHl88kjcJ-KfYC8jELT1DXjEb9pxYrzaXTPi755zDXX5LH&currency=USD&components=buttons"></script>
    
    <style>
        body { background-color: #000; color: #fff; font-family: 'Segoe UI', sans-serif; margin: 0; padding: 0; overflow-x: hidden; }
        .navbar { padding: 20px 50px; display: flex; justify-content: space-between; align-items: center; }
        .logo { font-size: 24px; font-weight: bold; letter-spacing: 2px; }
        
        .hero { display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; padding: 100px 20px; background: radial-gradient(circle at center, #111 0%, #000 70%); }
        .hero h1 { font-size: 80px; margin: 0; line-height: 1; font-weight: 800; }
        .hero p { color: #888; font-size: 18px; margin-top: 20px; }
        
        .main-content { display: flex; justify-content: center; gap: 50px; padding: 50px; flex-wrap: wrap; }
        .product-info { max-width: 400px; text-align: left; }
        .product-info h2 { font-size: 45px; margin-bottom: 10px; }
        .tags { margin-top: 20px; display: flex; gap: 10px; }
        .tag { border: 1px solid #333; padding: 8px 20px; border-radius: 20px; font-size: 14px; background: #111; }

        .checkout-card, .review-card { background: #111; padding: 40px; border-radius: 30px; width: 100%; max-width: 400px; border: 1px solid #222; }
        .price-tag { font-size: 32px; font-weight: bold; margin-bottom: 20px; }
        .price-tag span { font-size: 16px; color: #666; }

        input, select, textarea { width: 100%; padding: 15px; margin-bottom: 15px; border-radius: 12px; border: 1px solid #333; background: #000; color: #fff; font-size: 16px; font-family: inherit; }
        
        .review-section { padding: 80px 20px; display: flex; flex-direction: column; align-items: center; background: #000; }
        .review-section h3 { font-size: 32px; margin-bottom: 30px; }
        .submit-btn { background: #fff; color: #000; border: none; padding: 15px; width: 100%; border-radius: 12px; font-weight: bold; cursor: pointer; font-size: 16px; }
        .submit-btn:hover { background: #ccc; }

        #paypal-button-container { margin-top: 20px; }
    </style>
</head>
<body>

    <div class="navbar">
        <div class="logo">LUMINA</div>
    </div>

    <div class="hero">
        <h1>Purely<br>Essential.</h1>
        <p>Modern cleaning science meets 100% natural ingredients.</p>
    </div>

    <div class="main-content">
        <div class="product-info">
            <h2>Lumina Multi-Surface</h2>
            <p>Streak-free clarity for every surface. Safe for family and pets.</p>
            <div class="tags">
                <div class="tag">Dubai Based</div>
                <div class="tag">Natural Formula</div>
            </div>
        </div>

        <div class="checkout-card">
            <div class="price-tag">4.00 <span>AED</span></div>
            <input type="text" id="orderName" placeholder="Full Name">
            <input type="text" id="orderAddress" placeholder="Shipping Address">
            <select id="orderQty">
                <option value="1">1 Bottle</option>
                <option value="2">2 Bottles</option>
                <option value="4" selected>4 Bottles</option>
            </select>
            <div id="paypal-button-container"></div>
        </div>
    </div>

    <div class="review-section">
        <h3>Share Your Experience</h3>
        <div class="review-card">
            <input type="text" id="revName" placeholder="Your Name">
            <select id="revRating">
                <option value="5">⭐⭐⭐⭐⭐ (Excellent)</option>
                <option value="4">⭐⭐⭐⭐ (Good)</option>
                <option value="3">⭐⭐⭐ (Average)</option>
            </select>
            <textarea id="revComment" rows="3" placeholder="Write your review..."></textarea>
            <button class="submit-btn" onclick="submitReview()">Submit Review</button>
        </div>
    </div>

<script>
    const scriptURL = 'https://script.google.com/macros/s/AKfycbwlP_f2ls-MIT-RHixtjP0Y0TBLs3tfCw5_QVWjbT8GFiRHmGZY4u0bVmBc6RJQmCpJ/exec';

    // PayPal Logic
    paypal.Buttons({
        style: { layout: 'vertical', color: 'gold', shape: 'rect', label: 'paypal' },
        createOrder: function(data, actions) {
            const qty = document.getElementById('orderQty').value;
            if (!document.getElementById('orderName').value) { alert("Please enter your name"); return actions.reject(); }
            return actions.order.create({
                purchase_units: [{ amount: { currency_code: "USD", value: (qty * 1.09).toFixed(2) } }]
            });
        },
        onApprove: function(data, actions) {
            return actions.order.capture().then(function(details) {
                const orderData = {
                    type: "order", // Targets Sheet1
                    name: document.getElementById('orderName').value,
                    address: document.getElementById('orderAddress').value,
                    quantity: document.getElementById('orderQty').value,
                    total: (document.getElementById('orderQty').value * 4) + " AED"
                };
                fetch(scriptURL, { method: 'POST', mode: 'no-cors', body: JSON.stringify(orderData) });
                alert('Order Placed Successfully!');
                window.location.reload();
            });
        }
    }).render('#paypal-button-container');

    // Review Logic
    function submitReview() {
        const revData = {
            type: "review", // Targets Sheet2
            name: document.getElementById('revName').value,
            rating: document.getElementById('revRating').value,
            comment: document.getElementById('revComment').value
        };

        if(!revData.name || !revData.comment) { alert("Please fill in your name and review!"); return; }

        fetch(scriptURL, { method: 'POST', mode: 'no-cors', body: JSON.stringify(revData) })
        .then(() => {
            alert("Thank you for your feedback!");
            document.getElementById('revName').value = "";
            document.getElementById('revComment').value = "";
        });
    }
</script>

</body>
</html>
